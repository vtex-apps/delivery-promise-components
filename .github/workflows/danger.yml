name: Danger actions
'on':
  pull_request:
    types:
      [
        opened,
        edited,
        reopened,
        synchronize,
        assigned,
        unassigned,
        review_requested,
        review_request_removed,
      ]
jobs:
  danger-ci:
    name: Danger CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version-file: '.nvmrc'
          cache: yarn
        env:
          RUNNER_TEMP: /tmp
      - name: yarn install
        run: yarn install
      - name: Danger CI
        uses: vtex/danger@master
        env:
          GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
          REQUIRE_CHANGELOG_VERSION: false
